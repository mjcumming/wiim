codecov:
  require_ci_to_pass: true
  notify:
    wait_for_ci: true

coverage:
  precision: 2
  round: down
  range: "70...100"
  status:
    project:
      default:
        target: auto
        threshold: 1%
        if_ci_failed: success
        only_pulls: false
    patch:
      default:
        target: 70%
        threshold: 5%
        if_ci_failed: success

comment:
  layout: "reach, diff, flags, files"
  behavior: default
  require_changes: false

ignore:
  - "tests/**/*"
  - "development/**/*"
  - "stubs/**/*"
  - "scripts/**/*"
