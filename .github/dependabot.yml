version: 2
updates:
  # Python dependencies — grouped into a single PR per cycle to minimize churn.
  # pywiim is intentionally NOT managed here: it lives in manifest.json (HACS
  # custom-integration manifests aren't a Dependabot ecosystem) and is bumped
  # manually as part of the release workflow.
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
    open-pull-requests-limit: 1
    reviewers:
      - "mjcumming"
    groups:
      python-deps:
        patterns:
          - "*"
    # Ignore dependencies whose versions are dictated by Home Assistant Core
    # or by pytest-homeassistant-custom-component (transitive pins).
    ignore:
      - dependency-name: "pytest-homeassistant-custom-component"
      - dependency-name: "pytest"
      - dependency-name: "pytest-cov"
      - dependency-name: "pytest-asyncio"
      - dependency-name: "pytest-timeout"
      - dependency-name: "pytest-xdist"
      - dependency-name: "coverage"
      - dependency-name: "freezegun"
      - dependency-name: "aiohttp"

  # GitHub Actions — grouped, monthly. This is the genuinely useful one:
  # deprecated actions silently break CI months later.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
    open-pull-requests-limit: 1
    groups:
      github-actions:
        patterns:
          - "*"
